name: Azure Deploy Runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  RESOURCE_GROUP: ar-Aluki
  FUNCTION_APP_NAME: func-araluki-dev-6155
  KEYVAULT_NAME: kvaralukidev6155

jobs:
  build-and-validate-infra:
    runs-on: ubuntu-latest
    outputs:
      function_project_exists: ${{ steps.detect-function-project.outputs.exists }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Aluki.Runtime.slnx

      - name: Build
        run: dotnet build Aluki.Runtime.slnx --configuration Release --no-restore

      - name: Test (unit + contract)
        run: >-
          dotnet test Aluki.Runtime.slnx
          --configuration Release
          --no-build
          --filter "Category=Unit|Category=Contract"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate target infrastructure
        shell: bash
        run: |
          set -euo pipefail
          az functionapp show --resource-group "$RESOURCE_GROUP" --name "$FUNCTION_APP_NAME" --query "{name:name,state:state,appServicePlanId:appServicePlanId}" --output json
          az keyvault secret show --vault-name "$KEYVAULT_NAME" --name "ConnectivityProbe" --query "id" --output tsv

      - name: Detect Function project
        id: detect-function-project
        shell: bash
        run: |
          if [ -f "src/Aluki.Runtime.Functions/host.json" ] && [ -f "src/Aluki.Runtime.Functions/Aluki.Runtime.Functions.csproj" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-function:
    needs: build-and-validate-infra
    runs-on: ubuntu-latest
    if: needs.build-and-validate-infra.outputs.function_project_exists == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish Function project
        run: dotnet publish src/Aluki.Runtime.Functions/Aluki.Runtime.Functions.csproj --configuration Release --output publish

      - name: Package Function App
        shell: bash
        run: |
          cd publish
          zip -r ../function-app.zip .
          cd ..

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: function-app.zip

  no-function-project-note:
    needs: build-and-validate-infra
    runs-on: ubuntu-latest
    if: needs.build-and-validate-infra.outputs.function_project_exists != 'true'

    steps:
      - name: Inform missing function project
        run: |
          echo "No Azure Functions project found at src/Aluki.Runtime.Functions."
          echo "Infrastructure is validated and ready; deploy job will run automatically once that project exists."
