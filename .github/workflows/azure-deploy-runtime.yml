name: Azure Deploy Runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  RESOURCE_GROUP: ar-Aluki
  FUNCTION_APP_NAME: func-araluki-dev-6155
  KEYVAULT_NAME: kvaralukidev6155
  POSTGRES_SERVER_NAME: pg-araluki-dev-6155
  POSTGRES_SECRET_NAME: PostgresConnectionString

jobs:
  build-and-validate-infra:
    runs-on: ubuntu-latest
    outputs:
      function_project_exists: ${{ steps.detect-function-project.outputs.exists }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Aluki.Runtime.slnx

      - name: Build
        run: dotnet build Aluki.Runtime.slnx --configuration Release --no-restore

      - name: Test (unit + contract)
        run: >-
          dotnet test Aluki.Runtime.slnx
          --configuration Release
          --no-build
          --filter "Category=Unit|Category=Contract"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate target infrastructure
        shell: bash
        run: |
          set -euo pipefail
          az functionapp show --resource-group "$RESOURCE_GROUP" --name "$FUNCTION_APP_NAME" --query "{name:name,state:state,appServicePlanId:appServicePlanId}" --output json
          az keyvault secret show --vault-name "$KEYVAULT_NAME" --name "ConnectivityProbe" --query "id" --output tsv

      - name: Detect Function project
        id: detect-function-project
        shell: bash
        run: |
          if [ -f "src/Aluki.Runtime.Functions/host.json" ] && [ -f "src/Aluki.Runtime.Functions/Aluki.Runtime.Functions.csproj" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  migrate-database:
    needs: build-and-validate-infra
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Open database firewall for runner
        shell: bash
        run: |
          set -euo pipefail
          RUNNER_IP="$(curl -s https://api.ipify.org)"
          echo "Runner public IP: $RUNNER_IP"
          az postgres flexible-server firewall-rule create \
            --resource-group "$RESOURCE_GROUP" \
            --server-name "$POSTGRES_SERVER_NAME" \
            --name "ghrunner-${{ github.run_id }}" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP" \
            --output none

      - name: Apply database migrations
        shell: bash
        run: |
          set -euo pipefail

          CONN="$(az keyvault secret show --vault-name "$KEYVAULT_NAME" --name "$POSTGRES_SECRET_NAME" --query value -o tsv)"
          echo "::add-mask::$CONN"

          # Parse the Npgsql (ADO.NET) connection string into libpq PG* variables.
          CONN_LINES="${CONN//;/$'\n'}"
          while IFS= read -r pair; do
            [ -z "$pair" ] && continue
            key="$(printf '%s' "${pair%%=*}" | tr '[:upper:]' '[:lower:]' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            val="$(printf '%s' "${pair#*=}" | sed 's/^[[:space:]]*//')"
            case "$key" in
              host|server) PGHOST="$val" ;;
              port) PGPORT="$val" ;;
              database|"database name"|db) PGDATABASE="$val" ;;
              username|"user id"|user|uid) PGUSER="$val" ;;
              password|pwd) PGPASSWORD="$val" ;;
              "ssl mode"|sslmode) PGSSLMODE_RAW="$val" ;;
            esac
          done <<< "$CONN_LINES"

          : "${PGHOST:?connection string missing Host}"
          : "${PGDATABASE:?connection string missing Database}"
          : "${PGUSER:?connection string missing Username}"
          : "${PGPASSWORD:?connection string missing Password}"
          export PGPORT="${PGPORT:-5432}"
          case "$(printf '%s' "${PGSSLMODE_RAW:-Require}" | tr '[:upper:]' '[:lower:]')" in
            verifyca) export PGSSLMODE="verify-ca" ;;
            verifyfull) export PGSSLMODE="verify-full" ;;
            disable) export PGSSLMODE="disable" ;;
            allow) export PGSSLMODE="allow" ;;
            prefer) export PGSSLMODE="prefer" ;;
            *) export PGSSLMODE="require" ;;
          esac
          export PGHOST PGDATABASE PGUSER PGPASSWORD
          echo "::add-mask::$PGPASSWORD"

          # Migration ledger so idempotent scripts are not re-run unnecessarily.
          psql -v ON_ERROR_STOP=1 -c \
            "create table if not exists schema_migrations (filename text primary key, applied_at timestamptz not null default now());"

          for f in 001_init_tenancy 002_init_artifacts 003_enable_rls 004_whatsapp_capture_foundation 005_whatsapp_capture_rls 006_document_support 007_personal_memory 008_calendar_integration 009_ai_extraction 010_reminders 011_reminder_retries; do
            applied="$(psql -tA -c "select 1 from schema_migrations where filename = '$f';")"
            if [ "$applied" = "1" ]; then
              echo "skip $f (already applied)"
              continue
            fi
            echo "applying $f"
            psql -v ON_ERROR_STOP=1 -1 -f "db/migrations/$f.sql"
            psql -v ON_ERROR_STOP=1 -c "insert into schema_migrations (filename) values ('$f');"
          done

      - name: Remove database firewall rule
        if: always()
        shell: bash
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "$RESOURCE_GROUP" \
            --server-name "$POSTGRES_SERVER_NAME" \
            --name "ghrunner-${{ github.run_id }}" \
            --yes --output none || true

  deploy-function:
    needs: [build-and-validate-infra, migrate-database]
    runs-on: ubuntu-latest
    if: needs.build-and-validate-infra.outputs.function_project_exists == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish Function project
        run: dotnet publish src/Aluki.Runtime.Functions/Aluki.Runtime.Functions.csproj --configuration Release --output publish

      - name: Package Function App
        shell: bash
        run: |
          cd publish
          zip -r ../function-app.zip .
          cd ..

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: function-app.zip

  no-function-project-note:
    needs: build-and-validate-infra
    runs-on: ubuntu-latest
    if: needs.build-and-validate-infra.outputs.function_project_exists != 'true'

    steps:
      - name: Inform missing function project
        run: |
          echo "No Azure Functions project found at src/Aluki.Runtime.Functions."
          echo "Infrastructure is validated and ready; deploy job will run automatically once that project exists."
