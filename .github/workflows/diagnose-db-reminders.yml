name: Diagnose Reminder Failures (DB)

on:
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: Horas hacia atrás a revisar
        required: false
        default: "6"

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: ar-Aluki
  POSTGRES_SERVER_NAME: pg-araluki-dev-6155
  KEYVAULT_NAME: kvaralukidev6155
  POSTGRES_SECRET_NAME: PostgresConnectionString

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Open Postgres firewall
        shell: bash
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          az postgres flexible-server firewall-rule create \
            --resource-group "$RESOURCE_GROUP" \
            --server-name "$POSTGRES_SERVER_NAME" \
            --name "diag-runner-$GITHUB_RUN_ID" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"

      - name: Fetch connection string from Key Vault
        shell: bash
        run: |
          set -euo pipefail
          CONN="$(az keyvault secret show \
            --vault-name "$KEYVAULT_NAME" \
            --name "$POSTGRES_SECRET_NAME" \
            --query value -o tsv)"
          echo "::add-mask::$CONN"

          # Parse Npgsql ADO.NET connection string into libpq PG* env vars.
          CONN_LINES="${CONN//;/$'\n'}"
          while IFS= read -r pair; do
            [ -z "$pair" ] && continue
            key="$(printf '%s' "${pair%%=*}" | tr '[:upper:]' '[:lower:]' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            val="$(printf '%s' "${pair#*=}" | sed 's/^[[:space:]]*//')"
            case "$key" in
              host|server) PGHOST="$val" ;;
              port) PGPORT="$val" ;;
              database|"database name"|db) PGDATABASE="$val" ;;
              username|"user id"|user|uid) PGUSER="$val" ;;
              password|pwd) PGPASSWORD="$val" ;;
              "ssl mode"|sslmode) PGSSLMODE_RAW="$val" ;;
            esac
          done <<< "$CONN_LINES"

          : "${PGHOST:?missing Host}"
          : "${PGDATABASE:?missing Database}"
          : "${PGUSER:?missing Username}"
          : "${PGPASSWORD:?missing Password}"
          export PGPORT="${PGPORT:-5432}"
          case "$(printf '%s' "${PGSSLMODE_RAW:-Require}" | tr '[:upper:]' '[:lower:]')" in
            verifyca) PGSSLMODE="verify-ca" ;;
            verifyfull) PGSSLMODE="verify-full" ;;
            disable) PGSSLMODE="disable" ;;
            *) PGSSLMODE="require" ;;
          esac

          echo "PGHOST=$PGHOST" >> "$GITHUB_ENV"
          echo "PGDATABASE=$PGDATABASE" >> "$GITHUB_ENV"
          echo "PGUSER=$PGUSER" >> "$GITHUB_ENV"
          echo "PGPASSWORD=$PGPASSWORD" >> "$GITHUB_ENV"
          echo "PGPORT=${PGPORT:-5432}" >> "$GITHUB_ENV"
          echo "PGSSLMODE=$PGSSLMODE" >> "$GITHUB_ENV"
          echo "::add-mask::$PGPASSWORD"

      - name: Query — Schema check (tables in public + app schemas)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Tablas existentes en schemas public y app ==="
          psql <<SQL
            SELECT table_schema, table_name
            FROM information_schema.tables
            WHERE table_schema IN ('public', 'app')
              AND table_type = 'BASE TABLE'
            ORDER BY table_schema, table_name;
          SQL

      - name: Query — Dispatch audit (reminder agent outcomes)
        shell: bash
        run: |
          set -euo pipefail
          HOURS="${{ github.event.inputs.lookback_hours }}"
          echo ""
          echo "=== Dispatch audit — recordatorios (últimas ${HOURS}h) ==="
          psql <<SQL
            SELECT
              dispatched_at_utc,
              selected_agent_id,
              outcome,
              failure_agent_id,
              failure_details::text
            FROM dispatch_audit_events
            WHERE dispatched_at_utc >= now() - interval '${HOURS} hours'
              AND (selected_agent_id ILIKE '%reminder%' OR failure_agent_id ILIKE '%reminder%'
                   OR outcome = 'contained_failure')
            ORDER BY dispatched_at_utc DESC
            LIMIT 20;
          SQL

      - name: Query — All recent dispatch outcomes
        shell: bash
        run: |
          set -euo pipefail
          HOURS="${{ github.event.inputs.lookback_hours }}"
          echo ""
          echo "=== Todos los dispatch (últimas ${HOURS}h) ==="
          psql <<SQL
            SELECT
              dispatched_at_utc,
              channel_type,
              selected_agent_id,
              outcome,
              fallback_used,
              failure_agent_id,
              left(failure_details::text, 200) AS failure_details
            FROM dispatch_audit_events
            WHERE dispatched_at_utc >= now() - interval '${HOURS} hours'
            ORDER BY dispatched_at_utc DESC
            LIMIT 30;
          SQL

      - name: Query — Outbound messages sent
        shell: bash
        run: |
          set -euo pipefail
          HOURS="${{ github.event.inputs.lookback_hours }}"
          echo ""
          echo "=== Mensajes salientes (últimas ${HOURS}h) ==="
          psql <<SQL
            SELECT
              created_at_utc,
              status,
              left(body, 120) AS body_preview,
              error_reason
            FROM app.outbound_messages
            WHERE created_at_utc >= now() - interval '${HOURS} hours'
            ORDER BY created_at_utc DESC
            LIMIT 20;
          SQL

      - name: Query — Active reminders
        shell: bash
        run: |
          set -euo pipefail
          echo ""
          echo "=== Recordatorios activos ==="
          psql <<SQL
            SELECT
              reminder_id,
              left(reminder_text, 80) AS reminder_text,
              scheduled_time_utc,
              timezone,
              status,
              delivery_attempt_count,
              created_at_utc
            FROM reminders
            WHERE status IN ('scheduled', 'firing', 'delivery_failed')
              AND deleted_at_utc IS NULL
            ORDER BY scheduled_time_utc ASC
            LIMIT 20;
          SQL

      - name: Close Postgres firewall
        if: always()
        shell: bash
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "$RESOURCE_GROUP" \
            --server-name "$POSTGRES_SERVER_NAME" \
            --name "diag-runner-$GITHUB_RUN_ID" \
            --yes || true
