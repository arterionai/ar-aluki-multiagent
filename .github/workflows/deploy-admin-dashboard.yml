name: Deploy Admin Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'admin-dashboard/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and deploy admin dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '/admin-dashboard'
          output_location: '.next'
          app_build_command: 'npm ci --legacy-peer-deps && npm run build'
        env:
          NEXT_PUBLIC_API_BASE_URL: https://func-araluki-dev-6155.azurewebsites.net
          NEXT_PUBLIC_AAD_TENANT_ID: 7b1683c8-3607-4002-a544-89f96fa0ef3a
          NEXT_PUBLIC_AAD_CLIENT_ID: 1e1562a3-eb31-4b9d-beed-eeb8129961f9
          NEXT_PUBLIC_ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
