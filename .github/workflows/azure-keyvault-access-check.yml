name: Azure Key Vault Access Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 001-whatsapp-capture
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  keyvault-access-check:
    runs-on: ubuntu-latest
    env:
      KEYVAULT_NAME: kvaralukidev6155
      PROBE_SECRET_NAME: ConnectivityProbe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Key Vault access
        shell: bash
        run: |
          set -euo pipefail
          az account show --query "{subscriptionId:id, tenantId:tenantId}" --output json
          az keyvault secret show --vault-name "$KEYVAULT_NAME" --name "$PROBE_SECRET_NAME" --query "id" --output tsv
          echo "Key Vault access check passed"
