## Compliance Notes

- All audit events are **immutable** once persisted
- Retention policy: **7 years** for financial/billing events, **2 years** for others
- **Sensitive data** (content, PII) MUST NOT be included in audit events; use hashes/IDs only
- **Audit logs are not backups**: Separate backup/recovery procedures apply
