openapi: 3.0.3
info:
  title: Aluki Personal Memory Contract
  version: 0.1.0
  description: Contract for personal memory interaction classification, note capture, and grounded recall.
paths:
  /api/memory/personal/interactions:
    post:
      summary: Process personal memory interaction
      operationId: processPersonalMemoryInteraction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryInteractionRequest'
      responses:
        '200':
          description: Successful recall response or accepted note capture outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryInteractionResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryError'
        '403':
          description: Scope denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryError'
components:
  schemas:
    MemoryInteractionRequest:
      type: object
      required:
        - correlation_id
        - source_channel
        - input_text
        - requested_at_utc
      properties:
        correlation_id:
          type: string
        source_channel:
          type: string
        principal:
          $ref: '#/components/schemas/PrincipalScope'
        input_text:
          type: string
          minLength: 1
        source_identity:
          type: string
          description: Stable source identity used for idempotency on note capture.
        requested_at_utc:
          type: string
          format: date-time
    PrincipalScope:
      type: object
      required:
        - tenant_id
        - context_id
        - user_id
      properties:
        tenant_id:
          type: string
          format: uuid
        context_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        roles:
          type: array
          items:
            type: string
    MemoryInteractionResponse:
      type: object
      required:
        - correlation_id
        - intent
        - status
      properties:
        correlation_id:
          type: string
        intent:
          type: string
          enum: [note_to_store, recall_query]
        status:
          type: string
          enum: [accepted, duplicate_suppressed, grounded_result, low_confidence, no_result, denied]
        memory_artifact:
          $ref: '#/components/schemas/MemoryArtifactAck'
        recall:
          $ref: '#/components/schemas/RecallResult'
    MemoryArtifactAck:
      type: object
      properties:
        canonical_chain_id:
          type: string
          format: uuid
        chain_version:
          type: integer
          minimum: 1
        idempotency_key:
          type: string
    RecallResult:
      type: object
      properties:
        confidence:
          type: string
          enum: [confirmed, low]
        clarification_question:
          type: string
          nullable: true
        no_result_reason:
          type: string
          nullable: true
          enum: [no_evidence, deleted_evidence_gap]
        topic_groups:
          type: array
          items:
            $ref: '#/components/schemas/TopicGroup'
        claims:
          type: array
          items:
            $ref: '#/components/schemas/RecallClaim'
    TopicGroup:
      type: object
      required:
        - topic
        - artifact_ids
      properties:
        topic:
          type: string
        artifact_ids:
          type: array
          items:
            type: string
            format: uuid
    RecallClaim:
      type: object
      required:
        - claim_id
        - text
      properties:
        claim_id:
          type: string
        text:
          type: string
        confirmation_status:
          type: string
          enum: [confirmed, low_confidence]
        citations:
          type: array
          items:
            $ref: '#/components/schemas/Citation'
          minItems: 0
    Citation:
      type: object
      required:
        - memory_artifact_id
        - provenance_ref
      properties:
        memory_artifact_id:
          type: string
          format: uuid
        provenance_ref:
          type: string
    MemoryError:
      type: object
      required:
        - correlation_id
        - code
        - message
      properties:
        correlation_id:
          type: string
        code:
          type: string
          enum: [invalid_payload, scope_denied]
        message:
          type: string
