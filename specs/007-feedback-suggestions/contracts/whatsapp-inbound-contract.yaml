---
# WhatsApp Inbound Suggestion Intent Contract
# Version: 1.0
# Date: 2026-06-21
# Description: |
#   Defines the inbound contract for WhatsApp-originated suggestion messages.
#   Extends the existing 001-whatsapp-capture webhook payload with suggestion-specific routing.

contract_type: inbound_webhook_routing
feature: 007-feedback-suggestions
extension_of: 001-whatsapp-capture
endpoint: /api/v1/webhooks/whatsapp/inbound

---

## Request Contract

### Inbound Webhook Payload (from 001-whatsapp-capture)

```yaml
POST /api/v1/webhooks/whatsapp/inbound
Content-Type: application/json
X-WhatsApp-Signature: <hmac-sha256>

{
  "tenant_id": "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx",
  "message_id": "wamid.xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
  "from_user_id": "1234567890",  # WhatsApp phone number
  "message_type": "text" | "audio" | "image",
  "timestamp": 1719015600,
  "payload": {
    # Variant 1: Text message
    "text": "I think the app should support offline mode"
    
    # Variant 2: Audio message
    # "audio_url": "https://example.blob.core.windows.net/audio/xxxxx.mp4",
    # "audio_mime_type": "audio/mp4",
    # "audio_size_bytes": 125000
    
    # Variant 3: Image message
    # "image_url": "https://example.blob.core.windows.net/images/xxxxx.jpeg",
    # "image_mime_type": "image/jpeg",
    # "image_caption": "optional caption",
    # "image_size_bytes": 50000
  }
}
```

### Suggestion Intent Detection (New)

The inbound handler must identify suggestion intent using these heuristics:

```yaml
Suggestion Intent Signals:
  - Keywords: ["suggest", "feature request", "I think", "should have", "would be great if", "consider adding", "feedback"]
  - Tone: Constructive or forward-looking (not complaint/issue)
  - Structure: Declarative statement or question with forward reference
  - Exclusions: Questions asking for help (→ MemoryAgent), error reports (→ IssueAgent)

Detection Confidence Thresholds:
  - High confidence (≥0.8): Route to FeedbackAgent
  - Medium confidence (0.5-0.8): Route to FeedbackAgent with confidence score in telemetry
  - Low confidence (<0.5): Route to MemoryAgent (fallback to recall)
```

### Routing Decision

```yaml
if message_intent_is_suggestion(text, message_type):
  route_to: FeedbackAgent
  action: capture_suggestion
else:
  route_to: MemoryAgent
  action: recall_or_store
```

---

## Response Contract

### Success Response (202 Accepted)

```yaml
HTTP 202 Accepted
Content-Type: application/json

{
  "status": "accepted",
  "message_id": "wamid.xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
  "suggestion_id": "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx",  # NEW: Only if suggestion captured
  "action": "suggestion_captured" | "memory_stored" | "recall_executed",
  "idempotency_key": "wamid.xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx:5min",
  "timestamp": "2026-06-21T14:30:00Z"
}
```

### Error Responses

#### Duplicate Ingestion (Idempotent)
```yaml
HTTP 200 OK
Content-Type: application/json

{
  "status": "ignored",
  "message": "Duplicate message within idempotency window (5 minutes)",
  "suggestion_id": "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx",  # Existing suggestion
  "reason": "message_id + payload_hash composite key matched",
  "timestamp": "2026-06-21T14:35:00Z"
}
```

#### Validation Failures
```yaml
HTTP 400 Bad Request
Content-Type: application/json

{
  "status": "error",
  "code": "invalid_payload",
  "message": "Audio file exceeds 50 MB limit",
  "message_id": "wamid.xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
  "timestamp": "2026-06-21T14:30:05Z"
}
```

#### Server-Side Errors (Transient)
```yaml
HTTP 503 Service Unavailable
Content-Type: application/json

{
  "status": "error",
  "code": "suggestion_engine_unavailable",
  "message": "FeedbackAgent temporarily unavailable; retry after 5 seconds",
  "retry_after_seconds": 5,
  "timestamp": "2026-06-21T14:30:10Z"
}
```

