## Payload Validation Rules

### Text Messages
- **Max length**: 5 KB inline (larger stored in blob)
- **Character encoding**: UTF-8 (WhatsApp enforced)
- **Validation**: Non-empty string, min 10 characters for suggestion intent

### Audio Messages
- **Supported MIME types**: audio/mp4, audio/webm, audio/ogg
- **Max file size**: 50 MB
- **Duration limit**: 60 minutes
- **Validation**: Must be downloadable from WhatsApp CDN within 5 minutes of webhook delivery

### Image Messages
- **Supported MIME types**: image/jpeg, image/png
- **Max file size**: 10 MB
- **Dimensions**: No constraint (handled by Azure Storage lifecycle)
- **Caption**: Optional; if provided, included in suggestion context

---

## Idempotency & Deduplication

### Composite Key Strategy
```yaml
Idempotency Key: SHA-256(message_id + payload_hash)
Window: 5 minutes from first ingestion
Tracking: In-memory cache (FeedbackAgent grain) + database dedupe lookup

Duplicate Detection:
  if (message_id, inbound_payload_hash) matches existing in last 5 minutes:
    → return 200 OK with existing suggestion_id (no new artifact)
  else:
    → create new suggestion, return 202 Accepted
```

### Payload Hashing
```yaml
Text messages:
  hash = SHA-256(message_type + text_content)

Audio messages:
  hash = SHA-256(message_type + audio_url + audio_size_bytes)
  # Note: Uses URL + size, not full audio download (optimization)

Image messages:
  hash = SHA-256(message_type + image_url + image_size_bytes)
  # Note: Caption not included in hash; caption changes don't trigger duplication
```

---

## Integration Points

### 001-whatsapp-capture (Upstream)
- Inbound webhook is shared; routing logic added to existing handler
- Suggestion detection runs post-validation of WhatsApp signature
- No changes to webhook signature verification or tenant isolation

### FeedbackAgent (Downstream)
- Receives routing decision with message ID, tenant-user scope, payload
- Responsible for context window management (30-min active window per user)
- Emits state transitions to audit log

### Memory Recall (002-personal-memory)
- Suggestions excluded from recall query results after `captured` state
- No active integration change; filtering is SQL-level (`WHERE artifact_type != 'suggestion'`)

