## Telemetry Events

All webhook events emit telemetry for observability:

```yaml
Event: suggestion_intent_detected
  - message_id: string
  - detected_confidence: float [0.0-1.0]
  - intent_signal: string (keyword match reason)
  - tenant_id: uuid
  - user_id: uuid

Event: suggestion_captured
  - suggestion_id: uuid
  - message_type: text | audio | image
  - idempotency_key: string
  - processing_time_ms: int

Event: duplicate_ignored
  - message_id: string
  - existing_suggestion_id: uuid
  - window_age_seconds: int

Event: suggestion_attachment_linked
  - suggestion_id: uuid
  - attachment_type: text | audio | image
  - file_size_bytes: int
  - linked_at: timestamp
  - context_window_remaining_seconds: int
```

---

## Compliance & Audit

### Data Retention
- All webhook payloads logged to audit trail (with tenant-user scope)
- Message IDs retained for 5-minute idempotency window
- State transitions immutable (append-only audit log)

### Encryption
- HTTPS enforced for all webhook calls (TLS 1.2+)
- Payloads encrypted at rest in PostgreSQL (TDE)
- Blob storage encrypted at rest (Azure Storage Service Encryption)

### Rate Limiting
- Per-tenant-user: Max 50 suggestions per day
- Per-webhook: Max 1000 messages/minute cluster-wide
- Backpressure: Return 429 Too Many Requests if quota exceeded
